name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    tags:
      - "v*"

jobs:
  backend:
    name: Backend — lint, type check, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: trainer_test
          POSTGRES_USER: trainer
          POSTGRES_PASSWORD: trainer
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Unit tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Integration tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://trainer:trainer@localhost:5433/trainer_test
          REDIS_URL: redis://localhost:6380/0
          CELERY_BROKER_URL: redis://localhost:6380/1
          CELERY_RESULT_BACKEND: redis://localhost:6380/2
          SECRET_KEY: test-secret-key-not-for-production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test-key' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test-key' }}
        run: pytest tests/integration/ -v --tb=short -m "not contract"

  frontend:
    name: Frontend — type check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check & build
        working-directory: frontend
        run: npm run build

  deploy:
    name: Build & deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/trainer/api:${{ github.sha }}
          docker build -f docker/Dockerfile.api -t $IMAGE .
          docker push $IMAGE
          echo "API_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build and push Worker image
        run: |
          IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/trainer/worker:${{ github.sha }}
          docker build -f docker/Dockerfile.worker -t $IMAGE .
          docker push $IMAGE
          echo "WORKER_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Run DB migrations
        run: |
          gcloud run jobs execute db-migrate \
            --region ${{ vars.GCP_REGION }} \
            --wait \
            --update-env-vars IMAGE_TAG=${{ github.sha }}

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy trainer-api \
            --image ${{ env.API_IMAGE }} \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1 \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest"

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy trainer-worker \
            --image ${{ env.WORKER_IMAGE }} \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 1Gi \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest"
